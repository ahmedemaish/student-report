<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TAM Academy Student Report</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#89f7fe,#66a6ff);
text-align:center;
}

.container{
background:white;
width:460px;
margin:auto;
margin-top:30px;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logo{
width:220px;
margin-bottom:10px;
}

input,textarea{
width:90%;
padding:8px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#388e3c;
}

.star{
font-size:26px;
cursor:pointer;
color:gray;
}

.star.active{
color:gold;
}

.certificate{
margin-top:20px;
padding:25px;
border:4px dashed #f4b400;
border-radius:15px;
background:#fffbe6;
text-align:left;
}

.title{
font-size:26px;
font-weight:bold;
color:#ff6b6b;
text-align:center;
}

.student{
font-size:24px;
margin:10px;
color:#333;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container" id="container">

<img src="logo.png" class="logo">

<h2>🎓 Student Report</h2>

<input id="name" placeholder="Student Name">

<input id="date" type="date">

<textarea id="lesson" placeholder="Lesson"></textarea>

<textarea id="homework" placeholder="Homework"></textarea>

<p>Rating</p>

<div>

<span class="star" onclick="rate(1)">★</span>
<span class="star" onclick="rate(2)">★</span>
<span class="star" onclick="rate(3)">★</span>
<span class="star" onclick="rate(4)">★</span>
<span class="star" onclick="rate(5)">★</span>

</div>

<textarea id="note" placeholder="Teacher Note"></textarea>

<br>

<button onclick="generateReport()">Generate Report</button>

<button onclick="downloadPDF()">Download PDF</button>

<button onclick="downloadImage()">Download Image</button>

<button onclick="copyReport()">Copy Report</button>

<div id="report" class="certificate"></div>

</div>

<script>

let rating = 0;

function rate(num){

rating = num;

let stars = document.querySelectorAll(".star");

stars.forEach((star,index)=>{

star.classList.remove("active");

if(index < num){
star.classList.add("active");
}

});

}

function generateReport(){

let name = document.getElementById("name").value.trim();
let date = document.getElementById("date").value;
let lesson = document.getElementById("lesson").value.trim();
let homework = document.getElementById("homework").value.trim();
let note = document.getElementById("note").value.trim();

if(!name || !date || !lesson || !homework){

alert("Please fill all fields");

return;

}

let stars = "⭐".repeat(rating);

let options = { year: 'numeric', month: 'long', day: 'numeric' };

let formattedDate = new Date(date).toLocaleDateString(undefined, options);

let homeworkFormatted = homework.replace(/\n/g,"<br>");

let report = `

<div style="text-align:center">
<img src="logo.png" style="width:180px">
</div>

<div class="title">🏆 Great Job!</div>

<div class="student">${name}</div>

<p><b>Date:</b> ${formattedDate}</p>

<p><b>Lesson:</b><br>${lesson}</p>

<p><b>Homework:</b><br>${homeworkFormatted}</p>

<p><b>Rating:</b> ${stars}</p>

<p><b>Teacher Note:</b><br>${note}</p>

`;

document.getElementById("report").innerHTML = report;

}

function downloadPDF(){

let element = document.getElementById("report");

html2pdf().from(element).save("student-report.pdf");

}

function downloadImage(){

let report = document.getElementById("report");

html2canvas(report).then(function(canvas){

let link = document.createElement("a");

link.download = "student-report.png";

link.href = canvas.toDataURL();

link.click();

});

}

function copyReport(){

let reportContent = document.getElementById("report").innerText;

navigator.clipboard.writeText(reportContent)

.then(()=> alert("Report copied"))

.catch(()=> alert("Copy failed"));

}

</script>

</body>
</html>
